services:
  # ------------------------------------------------------------------
  # 1. BACKEND API (NestJS + Prisma)
  # ------------------------------------------------------------------
  - type: web
    name: bravium-api
    env: node
    plan: starter # Se recomienda starter para que no se duerma (tareas de match en segundo plano)
    buildCommand: "npm ci && npx prisma generate && npm run build"
    startCommand: "npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bravium-db
          property: connectionString

  # ------------------------------------------------------------------
  # 2. FRONTEND (Next.js)
  # ------------------------------------------------------------------
  - type: web
    name: bravium-frontend
    env: node
    plan: starter
    # Como es un monorepo, entramos a la carpeta y construimos
    buildCommand: "cd apps/web && npm ci && npm run build"
    startCommand: "cd apps/web && npm run start"
    envVars:
      # URL de la API de arriba. Render te dará una automáticamente tipo: bravium-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: "https://bravium-api.onrender.com"

# ------------------------------------------------------------------
# 3. BASE DE DATOS POSTGRESQL (Opcional si ya tienes una)
# ------------------------------------------------------------------
databases:
  - name: bravium-db
    plan: starter
    postgresMajorVersion: 15
